<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- TOOL_TITLE --></title>
    <style>
/* {{BASE_CSS}} */
    </style>
    <style>
/* {{TOOL_CSS}} */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><!-- TOOL_TITLE --></h1>
            <div class="header-status">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </div>
            <button class="settings-btn" onclick="openSettings()" title="Settings">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
        </div>

        <!-- {{TOOL_TABS}} -->

        <!-- {{TOOL_BODY}} -->

        <!-- Settings modal — tool provides the body content -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button class="modal-close" onclick="closeSettings()">&times;</button>
                </div>
                <div class="modal-body">
                    <!-- {{SETTINGS_BODY}} -->

                    <!-- Shared WiFi settings (all tools) -->
                    <div class="settings-section">
                        <h3 class="settings-section-title">WiFi</h3>
                        <div class="setting-item">
                            <div class="form-group">
                                <label>Mode</label>
                                <select id="wifiMode" onchange="tbUpdateWifiModeUI()">
                                    <option value="0">Access Point Only</option>
                                    <option value="1">AP + Client</option>
                                    <option value="2">Client Only</option>
                                </select>
                                <div class="setting-hint" id="wifiModeDesc">Device creates its own WiFi network.</div>
                            </div>
                        </div>
                        <div class="setting-item" id="apCard">
                            <div class="form-group">
                                <label for="wifiApSSID">AP Network Name (SSID)</label>
                                <input type="text" id="wifiApSSID" placeholder="MyTool" maxlength="32">
                            </div>
                            <div class="form-group">
                                <label for="wifiApPass">AP Password (min 8 chars)</label>
                                <input type="password" id="wifiApPass" placeholder="Leave blank to keep current" maxlength="63" autocomplete="new-password">
                            </div>
                        </div>
                        <div class="setting-item" id="staCard" style="display:none;">
                            <div class="form-group">
                                <label for="wifiStaSSID">WiFi Network</label>
                                <div style="display:flex;gap:8px;">
                                    <input type="text" id="wifiStaSSID" placeholder="Network name" style="flex:1;">
                                    <button class="btn-secondary" id="scanBtn" onclick="tbScanWifi()" style="width:auto;padding:10px 16px;">Scan</button>
                                </div>
                                <div id="scanResults" class="scan-results" style="display:none;"></div>
                            </div>
                            <div class="form-group">
                                <label for="wifiStaPass">WiFi Password</label>
                                <input type="password" id="wifiStaPass" placeholder="Leave blank for open network" autocomplete="new-password">
                            </div>
                        </div>
                        <div class="setting-item">
                            <div class="form-group">
                                <label for="wifiMdns">mDNS Hostname</label>
                                <input type="text" id="wifiMdns" placeholder="e.g. mytool">
                                <div class="setting-hint">Access via <span id="mdnsPreview">hostname</span>.local (leave blank to disable)</div>
                            </div>
                        </div>
                        <button onclick="tbSaveWifi()" style="margin-top:4px;">Save &amp; Restart</button>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-section-title">Device Info</h3>
                        <div class="setting-item">
                            <p style="margin:0;font-size:0.875rem;color:var(--text-muted);">
                                IP: <span id="deviceIp">-</span><br>
                                MAC: <span id="deviceMac">-</span><br>
                                Free Heap: <span id="freeHeap">-</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
// {{BASE_JS}}
    </script>
    <script>
// {{TOOL_JS}}
    </script>
</body>
</html>
