; RS-232 Serial Tool — PlatformIO config
; Extends shared base, adds web build script

[platformio]
extra_configs = ../../platformio_base.ini

[env:xiao_esp32c3]
extends = base
extra_scripts = pre:../../build/build_web.py
build_flags =
    ${base.build_flags}
lib_deps =
    ${base.lib_deps}
    symlink://../../firmware

[env:xiao_esp32c3_ota]
extends = ota_base
extra_scripts = pre:../../build/build_web.py
build_flags =
    ${base.build_flags}
lib_deps =
    ${base.lib_deps}
    symlink://../../firmware
upload_port = serialtool.local

[env:xiao_esp32s3]
extends = base
board = seeed_xiao_esp32s3
extra_scripts = pre:../../build/build_web.py
build_flags =
    ${base.build_flags}
lib_deps =
    ${base.lib_deps}
    symlink://../../firmware

[env:xiao_esp32s3_ota]
extends = ota_base
board = seeed_xiao_esp32s3
extra_scripts = pre:../../build/build_web.py
build_flags =
    ${base.build_flags}
lib_deps =
    ${base.lib_deps}
    symlink://../../firmware
upload_port = serialtool.local
