name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test-web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [userial, wifiscan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Web build ${{ matrix.tool }}
        run: python build/build_web.py --tool-dir tools/${{ matrix.tool }}

  build:
    needs: test-web
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [userial, wifiscan]
        env: [xiao_esp32c3, xiao_esp32s3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio_base.ini') }}

      - run: pip install platformio

      - name: Build ${{ matrix.tool }} (${{ matrix.env }})
        run: |
          cd tools/${{ matrix.tool }}
          pio run -e ${{ matrix.env }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool }}-${{ matrix.env }}
          path: tools/${{ matrix.tool }}/.pio/build/${{ matrix.env }}/firmware.bin

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/firmware.bin" "release/${name}.bin"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.bin
