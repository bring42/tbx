; Toolbox Base — Shared PlatformIO settings
; Include this from your tool's platformio.ini using:
;   extra_configs = ../../platformio_base.ini
;   [env:xiao_esp32c3]
;   extends = base
;   extra_scripts = pre:../../build/build_web.py

[base]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
build_flags = -DARDUINO_USB_MODE=1
lib_deps =
    mathieucarbou/AsyncTCP@^3.2.14
    mathieucarbou/ESPAsyncWebServer@^3.4.5
    bblanchon/ArduinoJson@^7.0.0

; OTA base — extend this for wireless firmware uploads
; In your tool's platformio.ini add:
;
;   [env:xiao_esp32c3_ota]
;   extends = ota_base
;   extra_scripts = pre:../../build/build_web.py
;   build_flags   = ${base.build_flags}
;   lib_deps      = ${base.lib_deps}
;                   symlink://../../firmware
;   upload_port   = toolname.local   ; or explicit IP, e.g. 192.168.4.1
;   ; upload_flags = --auth=yourpassword

[ota_base]
extends = base
upload_protocol = espota
